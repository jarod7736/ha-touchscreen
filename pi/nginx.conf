server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/ha-touchscreen;
    index index.html;

    # Serve the SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No caching for index.html so new deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    access_log /var/log/nginx/ha-touchscreen.access.log;
    error_log  /var/log/nginx/ha-touchscreen.error.log;
}
